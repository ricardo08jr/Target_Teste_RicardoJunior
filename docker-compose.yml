version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: FaturaTrack.Api/Dockerfile
    ports:
      - "3277:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
