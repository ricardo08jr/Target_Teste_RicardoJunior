version: '3.8'

services:
  backend:
    build:
      context: ./Target_Teste
      dockerfile: Target_Teste.Api/Dockerfile
    ports:
      - "3277:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
